<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MrCoffeeTV</title>
    <style>
      body {
        background-color: #0e0e0e;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        padding: 40px;
      }

      .profile-pic {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        margin-right: 30px;
      }

      .intro {
        opacity: 0;
        animation: fadeIn 2s forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <img src="cofeeprof.png" alt="MrCoffeeTV" class="profile-pic"/>
    <div class="intro">
      <h1>MrCoffeeTV</h1>
      <p>Welcome to the official site!</p>
    </div>
  </body>
</html>
