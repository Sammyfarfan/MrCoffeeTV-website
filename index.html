<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MrCoffeeTV</title>
    <style>
      body {
        background-color: #0e0e0e;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }

      .banner {
        width: 80%;
        max-width: 900px;
        border-radius: 16px;
        margin-bottom: 30px;
        opacity: 0;
        animation: fadeIn 2s forwards;
      }

      .intro {
        opacity: 0;
        animation: fadeIn 2s 0.5s forwards;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      p {
        font-size: 1.2rem;
        color: #aaaaaa;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <img src="cofeeprof.png" alt="MrCoffeeTV" class="banner"/>
    <div class="intro">
      <h1>MrCoffeeTV</h1>
      <p>Welcome to the official site!</p>
    </div>
  </body>
</html>
